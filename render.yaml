services:
  - type: web
    name: krestik-i-nolik
    env: python
    region: frankfurt
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false          # заполнишь вручную в dashboard
      - key: SECRET_KEY
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1              # 1 ГБ хватит для фото
